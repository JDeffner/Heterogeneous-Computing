# Mosquitto configuration for the smart-home demonstrator.
# Note: for a local demo without authentication. In production you would need
# TLS, username/password and ACLs (see the report, Security section).

listener 1883
allow_anonymous true

# Second listener for MQTT over WebSockets (e.g. browser clients / debugging)
listener 9001
protocol websockets

# Persistence disabled: retained messages live only in memory and are cleared
# when the broker restarts (no durable state across reboots).
persistence false
# persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
log_type information
